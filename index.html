<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomi-Check Ultimate Matrix + Barcode</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', メイリオ, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 { margin-bottom: 5px; font-size: 2.4rem; color: #1a2a3a; }
        .subtitle { color: #555; margin-bottom: 20px; font-size: 1.2rem; font-weight: bold; }
        
        .lang-container { margin-bottom: 20px; }
        .lang-btn {
            padding: 10px 24px;
            margin: 0 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border: 3px solid #cbd5e1;
            background: white;
            border-radius: 30px;
            transition: all 0.2s;
        }
        .lang-btn.active { background: #1e293b; color: white; border-color: #1e293b; }

        #video-container {
            position: relative;
            width: 640px;
            height: 480px;
            margin: 0 auto;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 32px rgba(0,0,0,0.2);
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
        }
        
        #info-box {
            max-width: 620px;
            margin: 25px auto;
            padding: 25px;
            background: #ffffff;
            border: 6px solid #94a3b8;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.05);
        }
        #trash-category {
            font-size: 2.6rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #trash-instructions {
            font-size: 1.6rem;
            line-height: 1.6;
            text-align: left;
            white-space: pre-line;
            font-weight: bold;
        }

        #calendar-box {
            max-width: 620px;
            margin: 20px auto;
            background: #1e293b;
            color: #ffffff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        #calendar-box h3 { margin: 0 0 15px 0; font-size: 1.5rem; color: #38bdf8; }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }
        .day-card {
            background: #334155;
            padding: 10px 5px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .day-card.active-collection {
            background: #059669;
            border: 2px solid #34d399;
            transform: scale(1.05);
        }
        .day-card .day-name { font-size: 1.1rem; margin-bottom: 5px; color: #94a3b8; }
        .day-card.active-collection .day-name { color: #fff; }
        .day-card .gomi-type { font-size: 0.8rem; color: #cbd5e1; }

        #loading-status {
            font-size: 1.4rem; color: #ea580c; font-weight: bold; margin-bottom: 15px;
            background: #ffedd5; padding: 10px; border-radius: 8px; display: inline-block;
        }
        
        /* Barcode Feedback CSS */
        #barcode-alert {
            display: none;
            background: #e0f2fe;
            color: #0369a1;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <h1>🗑️ Gomi-Check</h1>
    <p class="subtitle">八王子市版 - AIカメラ ＆ バーコード分別アシスタント</p>

    <div class="lang-container">
        <button class="lang-btn active" onclick="setLanguage('ja')">日本語</button>
        <button class="lang-btn" onclick="setLanguage('en')">English</button>
    </div>

    <div id="loading-status">AIシステム＆バーコードリーダーを起動中...</div>
    <div id="barcode-alert"></div>

    <div id="video-container">
        <video id="webcam" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
    </div>
    
    <div id="info-box">
        <div id="trash-category">カメラにゴミまたはバーコードを映してください</div>
        <div id="trash-instructions">ゴミをカメラで捉えるか、商品のバーコード線を近づけると自動解析します。</div>
    </div>

    <div id="calendar-box">
        <h3 id="calendar-title">八王子市 基本収集スケジュール (Weekly Schedule)</h3>
        <div class="calendar-grid">
            <div class="day-card" id="day-Mon"><div class="day-name">月</div><div class="gomi-type" id="txt-Mon">可燃</div></div>
            <div class="day-card" id="day-Tue"><div class="day-name">火</div><div class="gomi-type" id="txt-Tue">不燃</div></div>
            <div class="day-card" id="day-Wed"><div class="day-name">水</div><div class="gomi-type" id="txt-Wed">プラ</div></div>
            <div class="day-card" id="day-Thu"><div class="day-name">木</div><div class="gomi-type" id="txt-Thu">可燃</div></div>
            <div class="day-card" id="day-Fri"><div class="day-name">金</div><div class="gomi-type" id="txt-Fri">資源/缶</div></div>
            <div class="day-card" id="day-Sat"><div class="day-name">土</div><div class="gomi-type" id="txt-Sat">ペット</div></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    
    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        const statusLabel = document.getElementById('loading-status');
        const categoryLabel = document.getElementById('trash-category');
        const instructionsLabel = document.getElementById('trash-instructions');
        const infoBox = document.getElementById('info-box');
        const barcodeAlert = document.getElementById('barcode-alert');

        let currentLang = 'ja';
        let model;
        let lastSpokenCategory = ""; 
        let barcodeCooldown = false;

        // Visual Object Dictionary
        const hachiojiRules = {
            "bottle": {
                color: "#3b82f6", scheduleId: "day-Sat",
                ja: { category: "ペットボトル", text: "① キャップとラベルを必ず外す！\n② 中を軽くすすぐ。\n③ つぶして出す！" },
                en: { category: "PET Bottles", text: "1. Remove cap and label!\n2. Rinse inside lightly.\n3. Crush to flatten!" }
            },
            "can": {
                color: "#22c55e", scheduleId: "day-Fri",
                ja: { category: "空き缶", text: "① 中をサッとすすぐ。\n② 軽くつぶす！\n③ そのまま黄色の回収容器へ出す。" },
                en: { category: "Empty Cans", text: "1. Rinse inside cleanly.\n2. Crush lightly!\n3. Put directly into yellow bins." }
            },
            "cup": {
                color: "#f97316", scheduleId: "day-Wed",
                ja: { category: "容器包装プラスチック", text: "① プラマークがあるか確認！\n② 洗って、透明・半透明の袋に入れて出す。" },
                en: { category: "Plastic Packaging", text: "1. Check for plastic mark.\n2. Clean and put in transparent bags." }
            },
            "banana": { 
                color: "#ef4444", scheduleId: "day-Mon",
                ja: { category: "可燃ごみ（燃えるゴミ）", text: "① 八王子市指定の「緑色のゴミ袋」に入れます。\n② 水切りをしっかりしてください。" }, 
                en: { category: "Burnable Waste", text: "1. Use Hachioji designated GREEN garbage bags.\n2. Drain water completely." } 
            },
            "scissors": { 
                color: "#708090", scheduleId: "day-Tue",
                ja: { category: "不燃ごみ（燃えないゴミ）", text: "① 八王子市指定の「橙色（オレンジ）のゴミ袋」に入れます。\n② 刃物は厚紙に包んで「キケン」と表記してください。" }, 
                en: { category: "Non-Burnable Waste", text: "1. Use Hachioji designated ORANGE bags.\n2. Wrap blades and label 'キケン'." } 
            }
        };

        // NEW FEATURE DATA: Barcode Database Mapping (Common Japanese Store Products)
        const barcodeDatabase = {
            "4902102072618": hachiojiRules["bottle"], // Coca Cola Japan Bottle Barcode
            "4901777232570": hachiojiRules["bottle"], // Suntory Iyemon Green Tea Bottle
            "4901411034638": hachiojiRules["can"],    // Kirin Barcode Can
            "4902888224058": hachiojiRules["cup"]     // Plastic Snack Cup Pack
        };

        const calLabels = {
            ja: { title: "八王子市 収集スケジュール", Mon: "可燃", Tue: "不燃", Wed: "プラ", Thu: "可燃", Fri: "資源缶", Sat: "ペット" },
            en: { title: "Hachioji Collection Schedule", Mon: "Burn", Tue: "Non-B", Wed: "Platc", Thu: "Burn", Fri: "Cans", Sat: "PET" }
        };

        const defaultText = {
            ja: { cat: "カメラにゴミまたはバーコードを映してください", inst: "ゴミをカメラで捉えるか、商品のバーコード線を近づけると自動解析します。" },
            en: { cat: "Show trash or barcode", inst: "Hold any object or bring the barcode line close to the camera lens." }
        };

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');
            
            document.getElementById('calendar-title').innerText = calLabels[currentLang].title;
            document.getElementById('txt-Mon').innerText = calLabels[currentLang].Mon;
            document.getElementById('txt-Tue').innerText = calLabels[currentLang].Tue;
            document.getElementById('txt-Wed').innerText = calLabels[currentLang].Wed;
            document.getElementById('txt-Thu').innerText = calLabels[currentLang].Thu;
            document.getElementById('txt-Fri').innerText = calLabels[currentLang].Fri;
            document.getElementById('txt-Sat').innerText = calLabels[currentLang].Sat;

            resetUI();
        }

        function resetUI() {
            categoryLabel.innerText = defaultText[currentLang].cat;
            instructionsLabel.innerText = defaultText[currentLang].inst;
            infoBox.style.borderColor = "#94a3b8";
            categoryLabel.style.color = "#333";
            lastSpokenCategory = ""; 
            document.querySelectorAll('.day-card').forEach(card => card.classList.remove('active-collection'));
        }

        async function setupWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480 }, audio: false
                });
                video.srcObject = stream;
                return new Promise((resolve) => { video.onloadedmetadata = () => { resolve(video); }; });
            } catch (error) {
                alert("カメラ起動エラー");
            }
        }

        function speakRules(titleText, bodyText) {
            window.speechSynthesis.cancel(); 
            let msg = new SpeechSynthesisUtterance();
            msg.text = titleText + " . " + bodyText.replace(/[①②③④\n]/g, " ");
            msg.lang = currentLang === 'ja' ? 'ja-JP' : 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function displayRuleMatch(rule) {
            const langData = rule[currentLang];
            categoryLabel.innerText = langData.category;
            categoryLabel.style.color = rule.color;
            instructionsLabel.innerText = langData.text;
            infoBox.style.borderColor = rule.color;

            document.querySelectorAll('.day-card').forEach(card => card.classList.remove('active-collection'));
            const targetedDay = document.getElementById(rule.scheduleId);
            if (targetedDay) targetedDay.classList.add('active-collection');
            if (rule.scheduleId === "day-Mon") {
                document.getElementById("day-Thu").classList.add('active-collection');
            }

            if (lastSpokenCategory !== langData.category) {
                speakRules(langData.category, langData.text);
                lastSpokenCategory = langData.category; 
            }
        }

        async function detectFrame() {
            if (!model) return;
            
            const predictions = await model.detect(video);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            let detectedRule = null;

            predictions.forEach(prediction => {
                if (hachiojiRules[prediction.class] && prediction.score > 0.55) {
                    detectedRule = hachiojiRules[prediction.class];
                    const [x, y, width, height] = prediction.bbox;
                    ctx.strokeStyle = detectedRule.color;
                    ctx.lineWidth = 6;
                    ctx.strokeRect(x, y, width, height);
                }
            });

            // If object detected visually AND barcode isn't active
            if (detectedRule && !barcodeCooldown) {
                displayRuleMatch(detectedRule);
            } else if (!detectedRule && predictions.length === 0 && !barcodeCooldown) {
                lastSpokenCategory = ""; 
            }

            requestAnimationFrame(detectFrame);
        }

        // NEW INTERACTION: Initialize Quagga Barcode Scanning Engine
        function initBarcodeScanner() {
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: video
                },
                decoder: {
                    readers: ["ean_reader", "ean_8_reader"] // standard Japanese JAN/EAN grocery codes
                }
            }, function(err) {
                if (err) return;
                Quagga.start();
            });

            Quagga.onDetected(function(data) {
                let code = data.codeResult.code;
                if (barcodeDatabase[code] && !barcodeCooldown) {
                    barcodeCooldown = true;
                    
                    // Highlight barcode detection event
                    barcodeAlert.innerText = `📦 Barcode Detected: ${code}`;
                    barcodeAlert.style.display = "inline-block";
                    
                    // Match barcode index map
                    displayRuleMatch(barcodeDatabase[code]);

                    // Remove warning alert after 4 seconds
                    setTimeout(() => {
                        barcodeAlert.style.display = "none";
                        barcodeCooldown = false;
                    }, 4000);
                }
            });
        }

        async function init() {
            try {
                model = await cocoSsd.load();
                statusLabel.style.display = 'none';
                await setupWebcam();
                initBarcodeScanner(); // fire scanner background threads
                detectFrame();
            } catch(e) {
                statusLabel.innerText = "読み込み失敗";
            }
        }

        init();
    </script>
</body>
</html>
