<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomi-Check Real-Time Core AI</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', メイリオ, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 { margin-bottom: 5px; font-size: 2.4rem; color: #1a2a3a; }
        .subtitle { color: #555; margin-bottom: 20px; font-size: 1.2rem; font-weight: bold; }
        
        #video-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 32px rgba(0,0,0,0.2);
            aspect-ratio: 4/3;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        #info-box {
            max-width: 480px;
            margin: 25px auto;
            padding: 25px;
            background: #ffffff;
            border: 6px solid #94a3b8;
            border-radius: 16px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        #trash-category { font-size: 2.2rem; font-weight: bold; margin-bottom: 10px; color: #475569; }
        #trash-instructions { font-size: 1.4rem; line-height: 1.6; text-align: left; font-weight: bold; white-space: pre-line; }

        #ai-status { font-size: 1.2rem; color: #ea580c; font-weight: bold; margin-bottom: 15px; background: #ffedd5; padding: 10px; border-radius: 8px; display: inline-block; }
    </style>
</head>
<body>

    <h1>🗑️ Gomi-Check AI</h1>
    <p class="subtitle">Autonomous On-Device Neural Network Material Stream</p>

    <div id="ai-status">⏳ ON-DEVICE BRAIN LOADING... (Please wait a few seconds)</div>

    <div id="video-container">
        <video id="webcam" autoplay muted playsinline></video>
    </div>
    
    <div id="info-box">
        <div id="trash-category">Initializing AI Core...</div>
        <div id="trash-instructions">Please wait for the status bar above to turn green, then hold up any item steadily.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1/dist/transformers.min.js"></script>

    <script>
        const video = document.getElementById('webcam');
        const categoryLabel = document.getElementById('trash-category');
        const instructionsLabel = document.getElementById('trash-instructions');
        const infoBox = document.getElementById('info-box');
        const aiStatus = document.getElementById('ai-status');

        let classifier;
        let lastSpoken = "";
        let canvasHelper = document.createElement('canvas');

        // Master Classification Keywords Grid Mapping Vector
        const garbageKeywords = [
            { keywords: ['mouse', 'trackball', 'computer mouse'], tag: 'electronic', title: 'PCマウス [小型家電ごみ]' },
            { keywords: ['t-shirt', 'jersey', 'cardigan', 'cloth', 'apron', 'coat', 'wool', 'pajama', 'velvet', 'suit'], tag: 'clothes', title: '古着・衣類 [資源ごみ]' },
            { keywords: ['bottle', 'water bottle', 'wine bottle', 'pop bottle', 'flask'], tag: 'bottle', title: 'ペットボトル・瓶 [資源]' },
            { keywords: ['can', 'beer can', 'tin can', 'beverage can'], tag: 'can', title: '飲料缶 [資源ごみ]' },
            { keywords: ['tray', 'bento box', 'plastic bag', 'container', 'packet', 'wrapper', 'tub', 'dish'], tag: 'plastic', title: 'プラスチック容器包装' }
        ];

        const localRules = {
            electronic: { color: "#a855f7", text: "① 中のバッテリーや乾電池は必ず抜き出す。\n② 地域センターや区役所に設置されている専用の小型家電回収箱へ直接投入してください。" },
            clothes: { color: "#ec4899", text: "① しっかり洗濯して完全に乾燥させる！\n② 透明な袋に入れて、指定の資源回収日（晴れの日）に集積所へ排出します。" },
            bottle: { color: "#3b82f6", text: "① プラスチック製のキャップとラベルを必ず剥がす。\n② 内部を軽く水ですすぎ、足で潰してから青色の回収ネット袋へ投入。" },
            can: { color: "#22c55e", text: "① 内部を水できれいにすすいで空にする。（中にタバコ等のゴミを入れない）\n② 軽く潰して、黄色の回収コンテナへ直接入れてください。" },
            plastic: { color: "#f97316", text: "① 商品についている「プラマーク」を確認する。\n② 汚れが落ちない油物の弁当パック等は、資源ではなく「可燃ごみ」として出してください。" }
        };

        async function setupWebcam() {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "environment" }, 
                audio: false 
            });
            video.srcObject = stream;
            return new Promise((resolve) => video.onloadedmetadata = () => resolve());
        }

        async function initAI() {
            try {
                // Point environment parameters directly towards the model directory cache target
                transformers.env.allowLocalModels = false;
                
                // Mount the global image classifier stream array module pipeline
                classifier = await transformers.pipeline('image-classification', 'Xenova/mobilenet_v2_1.0_224');
                
                aiStatus.innerText = "🟢 REAL-TIME LOCAL AI STREAM ONLINE";
                aiStatus.style.backgroundColor = "#dcfce7";
                aiStatus.style.color = "#15803d";
                categoryLabel.innerText = "スキャン待機中...";
                instructionsLabel.innerText = "マウス、衣服、ペットボトルなどをカメラの前に3秒間静止させてください。";
            } catch (err) {
                aiStatus.innerText = "🔴 AI Model Loading Failure (Please reload or check console)";
                console.error("Initialization Pipeline Blockage:", err);
            }
        }

        async function processingLoop() {
            if (!classifier) {
                setTimeout(processingLoop, 500);
                return;
            }

            // Downscale running live video matrices into standard 224x224 tensor blocks
            canvasHelper.width = 224;
            canvasHelper.height = 224;
            const ctx = canvasHelper.getContext('2d');
            ctx.drawImage(video, 0, 0, 224, 224);
            const dataUrl = canvasHelper.toDataURL('image/jpeg');

            try {
                const results = await classifier(dataUrl);
                const topMatch = results[0].label.toLowerCase();
                
                let foundMatch = null;
                for (let group of garbageKeywords) {
                    if (group.keywords.some(kw => topMatch.includes(kw))) {
                        foundMatch = group;
                        break;
                    }
                }

                if (foundMatch) {
                    const rule = localRules[foundMatch.tag];
                    infoBox.style.borderColor = rule.color;
                    categoryLabel.innerText = "🔍 " + foundMatch.title;
                    categoryLabel.style.color = rule.color;
                    instructionsLabel.innerText = rule.text;

                    // Trigger non-blocking text to speech loop
                    if (lastSpoken !== foundMatch.tag) {
                        window.speechSynthesis.cancel();
                        let msg = new SpeechSynthesisUtterance(foundMatch.title + "を自動検出しました。" + rule.text.replace(/[①②\n]/g, " "));
                        msg.lang = 'ja-JP';
                        window.speechSynthesis.speak(msg);
                        lastSpoken = foundMatch.tag;
                    }
                }
            } catch (err) {
                console.warn("Frame Processing Skipped:", err);
            }

            // Sample webcam input stream frame buffer safely every 1.2 seconds
            setTimeout(processingLoop, 1200);
        }

        async function main() {
            try {
                await setupWebcam();
                await initAI();
                processingLoop();
            } catch (e) {
                console.error("Application Initialization Error:", e);
            }
        }

        main();
    </script>
</body>
</html>
